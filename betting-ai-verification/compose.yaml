version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: mysql_db
    environment:
       MYSQL_DATABASE: bettingAi
       MYSQL_USER: myuser
       MYSQL_PASSWORD: secret
       MYSQL_ROOT_PASSWORD: verysecret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"

volumes:
  mysql_data: